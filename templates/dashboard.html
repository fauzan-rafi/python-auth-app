<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flask Auth</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        nav { background: #333; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 2rem; text-align: center; }
        .welcome-card { background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin-top: 2rem; }
        .logout-btn { background-color: #dc3545; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 14px; }
        .logout-btn:hover { background-color: #c82333; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <nav>
        <span>FlaskAuth App</span>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1>Selamat Datang, {{ name }}! 👋</h1>
            <p>Anda berhasil login ke dalam sistem.</p>
            <hr>
            <p style="color: #666; font-size: 14px;">Ini adalah area terproteksi yang ditarik dari database PostgreSQL.</p>
        </div>
    </div>
</body>
</html>
